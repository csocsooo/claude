<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nexora — The settlement layer for onchain credit.</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    background: #0a0014;
    color: #fff;
    font-family: 'IBM Plex Mono', ui-monospace, monospace;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }

  /* Three.js canvas pinned behind everything */
  #scene {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }

  /* Animated grid floor */
  .floor {
    position: fixed; bottom: 0; left: 0; right: 0; height: 50vh; z-index: 1;
    background:
      linear-gradient(180deg, transparent 0%, #0a0014 90%),
      linear-gradient(0deg, rgba(0,240,255,0.18) 1px, transparent 1px) 0 0 / 60px 60px,
      linear-gradient(90deg, rgba(0,240,255,0.18) 1px, transparent 1px) 0 0 / 60px 60px;
    transform: perspective(800px) rotateX(60deg);
    transform-origin: bottom;
    animation: floorScroll 6s linear infinite;
    pointer-events: none;
  }
  @keyframes floorScroll {
    from { background-position: 0 0, 0 0, 0 0; }
    to   { background-position: 0 0, 0 60px, 0 0; }
  }

  /* Vignette */
  .vignette {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(10,0,20,0.85) 90%);
  }

  nav {
    position: relative; z-index: 10;
    display: flex; justify-content: space-between; align-items: center;
    padding: 22px 40px;
    text-transform: uppercase; letter-spacing: 0.12em; font-size: 11px;
    color: #b8b8d4;
  }
  nav .mark {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: 18px; letter-spacing: -0.02em; color: #fff;
    text-transform: none;
  }
  nav .mark::before {
    content: ''; display: inline-block; width: 10px; height: 10px;
    background: linear-gradient(135deg, #00f0ff, #ff2ec4);
    border-radius: 50%; margin-right: 10px; vertical-align: 1px;
    box-shadow: 0 0 10px #00f0ff;
  }
  nav ul { display: flex; gap: 28px; list-style: none; }
  nav ul a {
    color: #b8b8d4; text-decoration: none;
    transition: color 150ms ease;
  }
  nav ul a:hover { color: #00f0ff; }
  nav .cta {
    padding: 10px 18px; border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.2); color: #fff; text-decoration: none;
    text-transform: uppercase; font-size: 11px; letter-spacing: 0.12em;
    transition: all 200ms ease;
  }
  nav .cta:hover {
    border-color: #00f0ff;
    box-shadow: 0 0 20px rgba(0,240,255,0.4);
  }

  .hero {
    position: relative; z-index: 5;
    display: grid; place-items: center;
    text-align: center; padding: 80px 24px 0;
    min-height: calc(100vh - 80px);
  }

  .badge {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 6px 16px; border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(8px);
    text-transform: uppercase; letter-spacing: 0.14em; font-size: 11px;
    color: #b8b8d4;
    margin-bottom: 32px;
    opacity: 0; transform: translateY(8px);
    animation: rise 700ms ease-out 100ms forwards;
  }
  .badge .live {
    width: 6px; height: 6px; border-radius: 50%; background: #00f0ff;
    box-shadow: 0 0 10px #00f0ff;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.9); }
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; letter-spacing: -0.03em;
    font-size: clamp(56px, 9vw, 144px);
    line-height: 0.95;
    max-width: 16ch;
    background: linear-gradient(180deg, #ffffff 0%, #b8b8d4 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  h1 .glow-word {
    background: linear-gradient(135deg, #00f0ff 0%, #ff2ec4 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 60px rgba(0,240,255,0.5);
    animation: glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
  }
  h1 .word {
    display: inline-block;
    opacity: 0; transform: translateY(20px);
    animation: rise 800ms cubic-bezier(.2,.7,.2,1) forwards;
  }

  .meta {
    margin-top: 22px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px; color: #b8b8d4;
    opacity: 0; animation: rise 800ms ease 700ms forwards;
  }

  .ctas {
    display: flex; gap: 14px; justify-content: center; margin-top: 38px;
    opacity: 0; animation: rise 800ms ease 850ms forwards;
  }
  .ctas a {
    padding: 14px 26px; border-radius: 999px;
    text-decoration: none; font-size: 13px;
    text-transform: uppercase; letter-spacing: 0.14em; font-weight: 500;
    transition: all 200ms ease;
  }
  .ctas .primary {
    background: linear-gradient(135deg, #00f0ff, #ff2ec4);
    color: #0a0014;
  }
  .ctas .primary:hover {
    box-shadow: 0 0 30px rgba(0,240,255,0.5);
    transform: translateY(-1px);
  }
  .ctas .ghost {
    border: 1px solid rgba(255,255,255,0.2); color: #fff;
  }
  .ctas .ghost:hover { border-color: #00f0ff; color: #00f0ff; }

  .stats {
    display: flex; justify-content: center; gap: 64px;
    margin-top: 80px; padding: 24px 0;
    border-top: 1px solid rgba(255,255,255,0.08);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    opacity: 0; animation: rise 800ms ease 1000ms forwards;
  }
  .stats .stat .v {
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: 28px; color: #fff; letter-spacing: -0.02em;
  }
  .stats .stat .l {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.14em;
    color: #b8b8d4; margin-top: 4px;
  }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 720px) {
    nav ul { display: none; }
    .stats { gap: 32px; flex-wrap: wrap; }
    .floor { display: none; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
    .badge, .meta, .ctas, .stats, h1 .word { opacity: 1; transform: none; }
  }
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="floor"></div>
  <div class="vignette"></div>

  <nav>
    <a href="#" class="mark">Nexora</a>
    <ul>
      <li><a href="#">Protocol</a></li>
      <li><a href="#">Vaults</a></li>
      <li><a href="#">Docs</a></li>
      <li><a href="#">Governance</a></li>
    </ul>
    <a href="#" class="cta">Launch app</a>
  </nav>

  <section class="hero">
    <div class="badge">
      <span class="live"></span>
      <span>Mainnet · v2 live on 6 chains</span>
    </div>

    <h1>
      <span class="word" style="animation-delay: 200ms">The settlement</span>
      <span class="word" style="animation-delay: 280ms">layer</span><br />
      <span class="word" style="animation-delay: 360ms">for</span>
      <span class="word glow-word" style="animation-delay: 440ms">onchain</span>
      <span class="word glow-word" style="animation-delay: 520ms">credit.</span>
    </h1>

    <div class="meta">Audited by Trail of Bits · OpenZeppelin · Spearbit · $2.4B+ TVL</div>

    <div class="ctas">
      <a href="#" class="primary">Launch app →</a>
      <a href="#" class="ghost">Read docs</a>
    </div>

    <div class="stats">
      <div class="stat"><div class="v" data-target="2.4">$0.0B</div><div class="l">Total TVL</div></div>
      <div class="stat"><div class="v" data-target="148">0</div><div class="l">Markets</div></div>
      <div class="stat"><div class="v" data-target="6">0</div><div class="l">Chains live</div></div>
      <div class="stat"><div class="v" data-target="0">0bps</div><div class="l">Origination fee</div></div>
    </div>
  </section>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
  import * as THREE from 'three';

  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Scene
  const canvas = document.getElementById('scene');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.z = 7;

  // Iridescent torus knot
  const geom = new THREE.TorusKnotGeometry(1.6, 0.45, 200, 32);
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      varying vec3 vNormal;
      varying vec3 vPos;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        vPos = mv.xyz;
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vNormal;
      varying vec3 vPos;
      uniform float uTime;
      void main() {
        vec3 viewDir = normalize(-vPos);
        float fres = pow(1.0 - max(dot(vNormal, viewDir), 0.0), 2.0);
        vec3 cyan = vec3(0.0, 0.94, 1.0);
        vec3 magenta = vec3(1.0, 0.18, 0.77);
        vec3 col = mix(magenta, cyan, fres + sin(uTime * 0.5 + vPos.y) * 0.15);
        gl_FragColor = vec4(col, 0.85);
      }
    `,
    transparent: true,
  });
  const knot = new THREE.Mesh(geom, mat);
  scene.add(knot);

  // Particle field
  const particleCount = 300;
  const particleGeom = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3]     = (Math.random() - 0.5) * 20;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 12;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 10 - 4;
  }
  particleGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particleMat = new THREE.PointsMaterial({
    color: 0x00f0ff, size: 0.04, transparent: true, opacity: 0.6, sizeAttenuation: true,
  });
  scene.add(new THREE.Points(particleGeom, particleMat));

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animate
  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    if (!reduced) {
      t += 0.005;
      knot.rotation.x = t * 0.6;
      knot.rotation.y = t * 0.9;
      mat.uniforms.uTime.value = t;
    }
    renderer.render(scene, camera);
  }
  animate();

  // Count-up stats
  const stats = document.querySelectorAll('[data-target]');
  if (!reduced) {
    stats.forEach((el) => {
      const target = parseFloat(el.dataset.target);
      const isMoney = el.textContent.includes('$');
      const isBps = el.textContent.includes('bps');
      const start = performance.now();
      const dur = 1500;
      function tick(now) {
        const p = Math.min((now - start) / dur, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        const val = target * eased;
        if (isMoney) el.textContent = '$' + val.toFixed(1) + 'B';
        else if (isBps) el.textContent = Math.round(val) + 'bps';
        else el.textContent = Math.round(val);
        if (p < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    });
  } else {
    stats.forEach((el) => {
      const t = parseFloat(el.dataset.target);
      if (el.textContent.includes('$')) el.textContent = '$' + t.toFixed(1) + 'B';
      else if (el.textContent.includes('bps')) el.textContent = Math.round(t) + 'bps';
      else el.textContent = Math.round(t);
    });
  }
</script>
</body>
</html>
